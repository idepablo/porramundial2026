   ['¿En qué país se redactaron las primeras reglas del fútbol moderno?','Inglaterra',['Escocia','Italia','Francia']],
   ['¿Cuántos minutos dura un partido reglamentario (sin descuento)?','90',['80','100','120']],

   ['¿En qué estadio se jugó la final del Mundial 2014?','Maracaná',['Mineirão','Arena Corinthians','Estadio Azteca']],

   ['¿En qué ciudad está el estadio Santiago Bernabéu?','Madrid',['Barcelona','Sevilla','Bilbao']],
   ['¿Qué selección perdió dos finales del Mundial seguidas, en 1974 y 1978?','Países Bajos',['Alemania','Brasil','Italia']],
   ['¿Qué selección sufrió el "Maracanazo" perdiendo en casa en 1950?','Brasil',['Argentina','Uruguay','Italia']],
   ['¿Cuántas veces ha sido campeón del mundo Uruguay?','2',['3','1','4']],
   ['¿Cuántas veces ha sido campeona del mundo Francia?','2',['3','1','4']],
   ['¿Cuántas veces ha sido campeona del mundo España?','1',['2','3','0']],

   ['¿Quién era el seleccionador de España campeona en 2010?','Vicente del Bosque',['Luis Aragonés','Julen Lopetegui','Luis Enrique']],
   ['¿Quién era el seleccionador de Argentina campeona en 2022?','Lionel Scaloni',['Diego Simeone','Mauricio Pochettino','Marcelo Bielsa']],
   ['¿Quién era el seleccionador de Francia campeona en 2018?','Didier Deschamps',['Zinedine Zidane','Laurent Blanc','Thierry Henry']],
   ['¿Qué jugador capitaneó a Italia al título del Mundial 2006?','Fabio Cannavaro',['Francesco Totti','Alessandro Del Piero','Andrea Pirlo']],

   ['¿Contra qué selección marcó Maradona la "Mano de Dios" en 1986?','Inglaterra',['Alemania','Brasil','Bélgica']],
   ['¿Qué selección ganó su tercer Mundial en 1970 y conservó la Copa Jules Rimet?','Brasil',['Italia','Alemania','Uruguay']],
   ['¿Cómo se llamaba el trofeo del Mundial antes de la actual Copa FIFA?','Copa Jules Rimet',['Copa Mundial','Copa de Oro','Copa Continental']],
   ['¿Qué animal fue la mascota del Mundial de 1966?','Un león',['Un perro','Un oso','Un toro']],
   ['¿En qué año debutó Pelé en un Mundial, ganándolo con 17 años?','1958',['1962','1954','1966']],
   ['¿Cuántos Mundiales ganó Pelé en total?','3',['2','4','1']],
   ['¿Qué dorsal hizo famoso Maradona?','10',['7','9','11']],
   ['¿Qué jugador holandés brilló en 1974 con el "fútbol total"?','Johan Cruyff',['Marco van Basten','Ruud Gullit','Dennis Bergkamp']],
   ['¿Qué selección ganó la primera Eurocopa, en 1960?','Unión Soviética',['España','Yugoslavia','Francia']],
   ['¿Qué país albergó el Mundial de 1966?','Inglaterra',['Francia','Alemania','Italia']],
   ['¿Qué portero ganó el Mundial 2010 con España?','Iker Casillas',['Víctor Valdés','Pepe Reina','David de Gea']],
   ['¿Quién marcó el primer gol del Mundial 2022 en la final por Argentina?','Lionel Messi',['Ángel Di María','Julián Álvarez','Nicolás Otamendi']]
  ];
  var N=8, DUR=60;

  // ── PRNG determinista por día (mismas preguntas para todos) ───────────────
  function hashStr(s){ var h=2166136261>>>0; for(var i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
  function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; var t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  function sShuffle(arr,seed){ var r=mulberry32(seed), a=arr.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(r()*(i+1)), t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]);}); }
  function dayKey(){ try{ return window.matchDateKey ? window.matchDateKey(new Date().toISOString()) : new Date().toISOString().slice(0,10); }catch(e){ return new Date().toISOString().slice(0,10); } }
  function dailySet(day){
    // Rotación SECUENCIAL: cada día toma el siguiente bloque de N preguntas de una
    // permutación fija. Días consecutivos = bloques consecutivos sin solaparse, así
    // NO se repite ninguna pregunta hasta agotar el banco (banco/N días).
    var blocks=Math.max(1, Math.floor(BANK.length/N));
    var dayNum=Math.floor(Date.parse(day+'T00:00:00Z')/86400000);
    var block=(((dayNum%blocks)+blocks)%blocks);
    var perm=sShuffle(BANK, 982451653); // misma permutación para todos
    return perm.slice(block*N, block*N+N).map(function(item){
      return { q:item[0], ok:item[1], opts:sShuffle([item[1]].concat(item[2]), hashStr(day+'|'+item[0])) };
    });
  }
  function pname(p){ if(!p) return 'Jugador'; return p.alias || [p.first_name,p.last_name].filter(Boolean).join(' ') || 'Jugador'; }

  var screen=document.getElementById('screen');
  var DAY=dayKey(), QS=dailySet(DAY), ME=null, PROFILE=null;
  try{ localStorage.setItem('pm-trivia-promo', DAY); }catch(e){}
  var qi=0, score=0, answered=0, timeLeft=DUR, timer=null, lock=false, startedAt=0, LB_VIEW='hoy';

  async function init(){
    try{ ME=(typeof getCurrentUser==='function')?await getCurrentUser():null; }catch(e){}
    if(!ME){
      screen.innerHTML='<div class="empty">Inicia sesión para jugar la Trivia diaria y aparecer en la clasificación.<br><br><a href="porra-login.html" style="color:var(--gold);font-weight:700">Iniciar sesión →</a></div>';
      return;
    }
    try{ PROFILE=(typeof getUserProfile==='function')?await getUserProfile(ME.id):null; }catch(e){}
    var existing=null;
    try{ var r=await getSB().from('trivia_results').select('score,answered').eq('user_id',ME.id).eq('day',DAY).maybeSingle(); existing=r.data; }catch(e){}
    if(existing){ score=existing.score; answered=existing.answered||0; await showEnd(true); }
    else showStart();
  }

  function showStart(){
    screen.innerHTML=''+
      '<div style="text-align:center;padding:6px 4px">'+
        '<div style="font-size:15px;color:var(--muted);margin-bottom:6px">Reto de hoy</div>'+
        '<div style="font-size:17px;font-weight:700;margin-bottom:4px">'+N+' preguntas · 60 segundos</div>'+
        '<div style="font-size:13px;color:var(--muted);margin-bottom:16px">Cada acierto suma 1 punto. Solo se juega una vez al día.</div>'+
        '<button class="t-btn" id="go">Empezar</button>'+
      '</div>';
    document.getElementById('go').onclick=begin;
  }

  function begin(){
    qi=0; score=0; answered=0; timeLeft=DUR; lock=false; startedAt=Date.now();
    renderPlay(); render();
    timer=setInterval(function(){ timeLeft-=0.1; if(timeLeft<=0){ timeLeft=0; tick(); finish(); } else tick(); },100);
  }
  function renderPlay(){
    screen.innerHTML=''+
      '<div class="t-top"><span class="t-time"><span id="secs">60</span>s</span><span class="t-sc">Aciertos: <b id="pts">0</b></span></div>'+
      '<div class="t-bar"><i id="bar"></i></div>'+
      '<div class="t-prog" id="prog"></div>'+
      '<div class="t-q" id="q"></div>'+
      '<div id="opts"></div>'+
      '<button class="t-pass" id="passBtn">Pasar</button>';
    document.getElementById('passBtn').onclick=pass;
  }
  function tick(){
    var s=document.getElementById('secs'); if(s) s.textContent=Math.ceil(timeLeft);
    var bar=document.getElementById('bar'); if(bar){ bar.style.width=Math.max(0,timeLeft/DUR*100)+'%'; bar.style.background=timeLeft<10?'var(--red)':'var(--green)'; }
  }
  function render(){
    if(qi>=QS.length){ finish(); return; }
    lock=false;
    var item=QS[qi];
    document.getElementById('prog').textContent='Pregunta '+(qi+1)+' de '+QS.length;
    document.getElementById('q').textContent=item.q;
    var box=document.getElementById('opts'); box.innerHTML='';
    item.opts.forEach(function(o){
      var b=document.createElement('button'); b.className='t-opt'; b.textContent=o;
      b.onclick=function(){ answer(b,o,item); };
      box.appendChild(b);
    });
  }
  function answer(btn,choice,item){
    if(lock) return; lock=true; answered++;
    var all=document.querySelectorAll('#opts .t-opt');
    all.forEach(function(b){ b.disabled=true; if(b.textContent===item.ok) b.classList.add('ok'); });
    if(choice===item.ok){ score++; document.getElementById('pts').textContent=score; }
    else btn.classList.add('no');
    setTimeout(function(){ qi++; if(timeLeft>0 && qi<QS.length) render(); else finish(); },650);
  }
  function pass(){ if(lock) return; qi++; if(qi<QS.length) render(); else finish(); }

  var finished=false;
  async function finish(){
    if(finished) return; finished=true;
    clearInterval(timer);
    try{
      await getSB().from('trivia_results').upsert(
        { user_id:ME.id, day:DAY, score:score, answered:answered, duration_ms:(Date.now()-startedAt) },
        { onConflict:'user_id,day', ignoreDuplicates:true });
    }catch(e){ console.error('save trivia',e); }
    await showEnd(false);
  }

  async function showEnd(already){
    screen.innerHTML=''+
      '<div class="t-big"><div class="v">'+score+'</div><div class="l">'+(already?'tu resultado de hoy':'aciertos de '+answered+' respondidas')+'</div></div>'+
      (already?'<div style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:6px">Ya jugaste hoy · vuelve mañana para un nuevo reto</div>':'')+
      '<div class="lb-tabs"><button data-v="hoy" class="on" onclick="__lb(\'hoy\')">Hoy</button><button data-v="gen" onclick="__lb(\'gen\')">General</button></div>'+
      '<div id="board"><div class="empty">Cargando clasificación…</div></div>';
    LB_VIEW='hoy'; renderBoard();
  }

  var NAME_CACHE=null;
  async function nameMap(){
    if(NAME_CACHE) return NAME_CACHE;
    try{ var us=(await getSB().from('users').select('id,first_name,last_name,alias')).data||[];
      var nm={}; us.forEach(function(u){ nm[u.id]=pname(u); }); NAME_CACHE=nm; }
    catch(e){ NAME_CACHE={}; }
    return NAME_CACHE;
  }
  async function renderBoard(){
    var board=document.getElementById('board'); if(!board) return;
    board.innerHTML='<div class="empty">Cargando…</div>';
    try{
      var nm=await nameMap(); var rows;
      if(LB_VIEW==='hoy'){
        var r=await getSB().from('trivia_results').select('user_id,score,created_at')
          .eq('day',DAY).order('score',{ascending:false}).order('created_at',{ascending:true}).limit(50);
        rows=(r.data||[]).map(function(x){ return { uid:x.user_id, name:nm[x.user_id]||'Jugador', score:x.score }; });
      } else {
        var all=(typeof fetchAll==='function') ? await fetchAll('trivia_results','user_id,score') : (await getSB().from('trivia_results').select('user_id,score')).data;
        var sum={}; (all||[]).forEach(function(x){ sum[x.user_id]=(sum[x.user_id]||0)+(x.score||0); });
        rows=Object.keys(sum).map(function(uid){ return { uid:uid, name:nm[uid]||'Jugador', score:sum[uid] }; })
          .sort(function(a,b){ return b.score-a.score; }).slice(0,50);
      }
      if(!rows.length){ board.innerHTML='<div class="empty">Aún no hay resultados. ¡Sé el primero!</div>'; return; }
      board.innerHTML=rows.map(function(r,i){
        var me=ME&&r.uid===ME.id;
        return '<div class="lb-row'+(i===0?' top1':'')+(me?' me':'')+'"><span class="rk">'+(i+1)+'</span><span class="nm">'+esc(r.name)+(me?' (tú)':'')+'</span><span class="pt">'+r.score+'</span></div>';
      }).join('');
    }catch(e){ console.error('board',e); board.innerHTML='<div class="empty">No se pudo cargar la clasificación.</div>'; }
  }
  window.__lb=function(v){ LB_VIEW=v; document.querySelectorAll('.lb-tabs button').forEach(function(b){ b.classList.toggle('on', b.dataset.v===v); }); renderBoard(); };

  if(typeof initNav==='function'){ try{ initNav(); }catch(e){} }
  init();
})();
</script>
